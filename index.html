<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Quincho - Centro Asturiano 🇦🇷</title>
  <style>
    :root { --azul-primario: #1e3a8a; --azul-gradiente: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); --amarillo: #f59e0b; --gris-fondo: #f1f5f9; --rojo: #ef4444; --verde: #10b981; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--gris-fondo); margin: 0; }
    .header-main { background: var(--azul-gradiente); color: white; padding: 30px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
    .header-logo img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--amarillo); }
    .container { max-width: 700px; margin: -30px auto 40px; padding: 0 20px; }
    .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: 600; color: var(--azul-primario); margin-bottom: 5px; font-size: 0.85rem; }
    input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .grid-invitados { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
    button { background: var(--azul-gradiente); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
    .modal.activa { display: flex; }
    .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .item-detalle { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f5f9; }
    .total-box { background: #eff6ff; border: 2px dashed var(--azul-primario); padding: 15px; border-radius: 15px; text-align: center; margin: 15px 0; font-weight: bold; }
    .footer-cs { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.8rem; color: #94a3b8; }
    .badge-cs { height: 18px; width: 18px; border-radius: 50%; background: #6366f1; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .btn-admin-small { background: none; border: none; color: #cbd5e1; text-decoration: underline; cursor: pointer; width: auto; padding: 0; }
  </style>
</head>
<body>

  <div class="header-main">
    <div class="header-logo"><img src="https://i.ibb.co/q3d6Ktzm/logo-centro-asturiano2.png"></div>
    <h1>🏠 Agenda Quincho</h1>
    <p>Centro Asturiano de Buenos Aires 🇦🇷</p>
  </div>

  <div id="modalValidacion" class="modal activa">
    <div class="modal-content" style="text-align: center;">
      <h2 style="color:var(--azul-primario)">¡Hola! 👋 ¡Pase, Estimado Socio! El quincho te recibe con el olor a leña y las ganas de armar esta agenda.</h2>
      <div class="form-group" style="text-align: left;">
        <label>N° de Socio</label><input type="number" id="numSocio" placeholder="Ej: 12345">
        <label>Fecha de Nacimiento</label><input type="text" id="fechaNac" placeholder="DD/MM/AAAA" oninput="mascaraFecha(this)">
      </div>
      <button onclick="validarSocio()">🔥 Ingresar 🪵</button>
      <footer class="footer-cs">
        <span>Powered by</span><span class="badge-cs">CS</span> | <button class="btn-admin-small" onclick="accesoAdmin()">Admin</button>
      </footer>
    </div>
  </div>

  <div id="adminPanel" class="modal">
    <div class="modal-content">
      <h2 style="color:var(--rojo); text-align: center;">🔐 Panel Administrativo</h2>
      <label>Bloquear Día (DD/MM/AAAA)</label>
      <input type="text" id="fechaBloqueo" placeholder="DD/MM/AAAA" oninput="mascaraFecha(this)">
      <button onclick="ejecutarBloqueo()" style="background:var(--rojo); margin-top:10px;">🚫 Bloquear Fecha</button>
      <button onclick="cerrarModal('adminPanel')" style="background:#94a3b8; margin-top:5px;">Cerrar</button>
    </div>
  </div>

  <div class="container">
    <div id="app" class="card" style="display:none;">
      <h2 id="nombreSocioDisplay" style="text-align:center; color:var(--azul-primario)"></h2>
      <div class="form-group">
        <label>📍 Lugar</label>
        <select id="tipoQuincho" onchange="calcularTotal()">
          <option value="">Seleccione...</option>
          <option value="cerrado">🛖 Quincho Cerrado</option>
          <option value="parrilla">🔥 Parrillas Externas</option>
        </select>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>📅 Fecha (Máx 10 días)</label>
          <input type="text" id="fechaEvento" placeholder="DD/MM/AAAA" oninput="mascaraFecha(this); calcularTotal();">
          <div id="badgeTarifa" style="display:none; font-size: 0.7rem; padding: 3px; border-radius: 5px; margin-top: 5px;"></div>
        </div>
        <div class="form-group"><label>👥 Total</label><input type="number" id="totalInvitados" readonly style="background:#f1f5f9"></div>
      </div>
      <div class="grid-2">
        <input type="text" id="horaInicio" placeholder="Inicio HH:MM" oninput="mascaraHora(this)">
        <input type="text" id="horaFin" placeholder="Fin HH:MM" oninput="mascaraHora(this); calcularTotal();">
      </div>
      <div class="grid-invitados">
        <div class="form-group"><label id="lbl_may">Mayores</label><input type="number" id="may" value="0" oninput="calcularTotal()"></div>
        <div class="form-group"><label id="lbl_juv">Juveniles</label><input type="number" id="juv" value="0" oninput="calcularTotal()"></div>
        <div class="form-group"><label id="lbl_jub">Jubilados</label><input type="number" id="jub" value="0" oninput="calcularTotal()"></div>
        <div class="form-group"><label id="lbl_men">Menores</label><input type="number" id="men" value="0" oninput="calcularTotal()"></div>
      </div>
      <div style="background:#f8fafc; padding:10px; border-radius:10px; margin-top:10px;">
        <label><input type="checkbox" id="inflable" onchange="alertaInflable(this); calcularTotal();"> 🎈 Inflable (+$20.000)</label>
        <label><input type="checkbox" id="cumple" onchange="alertaCumple(this); calcularTotal();"> 🎉 Socio Cumpleañero</label>
        <label style="color:var(--azul-primario); font-weight:bold;"><input type="checkbox" id="todosSocios" onchange="calcularTotal();"> 👥 Todos Socios</label>
      </div>
      <div class="total-box">Monto Total: ARS $<span id="montoVisual">0</span></div>
      <button id="btnConfirmar" disabled onclick="abrirConfirmacion()">📝 Revisar Detalle</button>
    </div>
  </div>

  <div id="modalFinal" class="modal">
    <div class="modal-content">
      <h2 style="color:var(--azul-primario); text-align:center;">📋 Resumen de Reserva</h2>
      <div id="desgloseFinal"></div>
      <button id="btnEnviar" onclick="enviarDatosFinales()" style="background:var(--verde); margin-top:10px;">💾 Guardar y Enviar</button>
      <button onclick="cerrarModal('modalFinal')" style="background:#94a3b8; margin-top:5px;">Editar</button>
    </div>
  </div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyDeA08kHyeJ5nhLrXVlTBJoY_dgpf762OGBUfWTQf4j_n1oxzgzBO6KzIcQ-gYLPQ7vQ/exec';
  const PRECIOS_SEMANA = { may: 6700, juv: 5400, jub: 4200, men: 3800, inf: 0, inflable: 20000, seguridad: 20000 };
  const PRECIOS_FINDE  = { may: 8300, juv: 6000, jub: 5300, men: 4300, inf: 0, inflable: 20000, seguridad: 20000 };
  let socioNombre = "";

  function mascaraFecha(i) { let v = i.value.replace(/\D/g, '').substring(0, 8); if (v.length > 2 && v.length <= 4) v = v.substring(0, 2) + '/' + v.substring(2); else if (v.length > 4) v = v.substring(0, 2) + '/' + v.substring(2, 4) + '/' + v.substring(4); i.value = v; }
  function mascaraHora(i) { let v = i.value.replace(/\D/g,''); if (v.length > 2) v = v.substring(0,2) + ':' + v.substring(2,4); i.value = v; }

  function accesoAdmin() { if (prompt("Clave Admin:") === "adm1081") document.getElementById('adminPanel').classList.add('activa'); }
  function cerrarModal(id) { document.getElementById(id).classList.remove('activa'); }

  function ejecutarBloqueo() {
    const f = document.getElementById('fechaBloqueo').value;
    if (f.length < 10) return alert("Fecha incompleta");
    fetch(`${APPS_SCRIPT_URL}?action=bloquearFecha&fecha=${f}`).then(() => { alert("Bloqueado"); cerrarModal('adminPanel'); });
  }

  function validarSocio() {
    const s = document.getElementById('numSocio').value;
    const f = document.getElementById('fechaNac').value;
    if (!s || f.length < 10) return alert("Completar datos");
    const p = f.split('/');
    fetch(`${APPS_SCRIPT_URL}?action=validarSocio&numSocio=${s}&fechaNac=${parseInt(p[0])}/${p[1]}/${p[2]}`)
      .then(r => r.json()).then(res => {
        if (res.exito) {
          socioNombre = res.nombre;
          document.getElementById('nombreSocioDisplay').innerText = "Socio/a: " + res.nombre;
          cerrarModal('modalValidacion'); document.getElementById('app').style.display = 'block';
        } else alert(res.mensaje);
      });
  }

  function calcularTotal() {
    const f = document.getElementById('fechaEvento').value;
    const badge = document.getElementById('badgeTarifa');
    let esFinde = true;
    if (f.length === 10) {
      const [dia, mes, anio] = f.split('/').map(Number);
      const ds = new Date(anio, mes - 1, dia, 12).getDay();
      esFinde = (ds === 0 || ds === 5 || ds === 6);
      badge.style.display = "block";
      badge.innerText = esFinde ? "Tarifa Finde/Feriado" : "Tarifa Semana";
      badge.style.background = esFinde ? "#dcfce7" : "#dbeafe";
    }
    const T = esFinde ? PRECIOS_FINDE : PRECIOS_SEMANA;
    document.getElementById('lbl_may').innerText = `Mayores ($${T.may})`;
    document.getElementById('lbl_juv').innerText = `Juveniles ($${T.juv})`;
    document.getElementById('lbl_jub').innerText = `Jubilados ($${T.jub})`;
    document.getElementById('lbl_men').innerText = `Menores ($${T.men})`;

    let c = { may: parseInt(document.getElementById('may').value)||0, juv: parseInt(document.getElementById('juv').value)||0, jub: parseInt(document.getElementById('jub').value)||0, men: parseInt(document.getElementById('men').value)||0 };
    let totalInv = Object.values(c).reduce((a, b) => a + b, 0);
    document.getElementById('totalInvitados').value = totalInv;

    let total = 0;
    if (!document.getElementById('todosSocios').checked) {
      total = (c.may*T.may)+(c.juv*T.juv)+(c.jub*T.jub)+(c.men*T.men);
      if (document.getElementById('cumple').checked) total -= (Math.min(totalInv, 10) * T.may); // Simplificado
    }
    if (document.getElementById('inflable').checked) total += 20000;
    document.getElementById('montoVisual').innerText = total.toLocaleString('es-AR');
    document.getElementById('btnConfirmar').disabled = totalInv === 0;
  }

  function alertaInflable(cb) { if(cb.checked) alert("🎈 Requiere ART y Seguro."); }
  function alertaCumple(cb) { if(cb.checked) alert("🎉 Bonif. 10 personas."); }

  function abrirConfirmacion() {
    const f = document.getElementById('fechaEvento').value;
    const l = document.getElementById('tipoQuincho').value;
    const btn = document.getElementById('btnConfirmar');
    btn.innerText = "🔍 Verificando..."; btn.disabled = true;

    fetch(`${APPS_SCRIPT_URL}?action=verificarDisponibilidad&fecha=${f}&lugar=${l}&invitados=${document.getElementById('totalInvitados').value}&inicio=${document.getElementById('horaInicio').value}`)
      .then(r => r.json()).then(res => {
        if (res.disponible) {
          document.getElementById('desgloseFinal').innerHTML = `<div class="item-detalle"><span>Socio:</span> <span>${socioNombre}</span></div><div class="item-detalle"><span>Fecha:</span> <span>${f}</span></div><div class="total-box">TOTAL: $${document.getElementById('montoVisual').innerText}</div>`;
          document.getElementById('modalFinal').classList.add('activa');
        } else {
          alert(res.mensaje);
        }
      }).finally(() => { btn.innerText = "📝 Revisar Detalle"; btn.disabled = false; });
  }

  function enviarDatosFinales() {
    fetch(`${APPS_SCRIPT_URL}?action=guardarAgenda&socio=${socioNombre}&total=${document.getElementById('montoVisual').innerText}&fechaEvento=${document.getElementById('fechaEvento').value}`)
      .then(() => { alert("Guardado"); location.reload(); });
  }
</script>
</body>
</html>
